{{- if .Values.blueGreen.enabled }}
# ──────────────────────────────────────────────────────────────────────────────
# ServiceSplitter – backend (blue/green mode only)
#
# Routes a configurable percentage of "backend" traffic to each version subset
# defined in the ServiceResolver.  The default split is 90% to v1 and 10% to
# v2, matching a typical blue/green canary rollout.
#
# Adjust .Values.blueGreen.trafficSplit.v1 / v2 (must sum to 100) to shift
# traffic toward the new version.  Setting v1=0, v2=100 completes a full
# cut-over to v2.
# ──────────────────────────────────────────────────────────────────────────────
{{- $v1 := int .Values.blueGreen.trafficSplit.v1 }}
{{- $v2 := int .Values.blueGreen.trafficSplit.v2 }}
{{- if ne (add $v1 $v2) 100 }}
  {{- fail (printf "blueGreen.trafficSplit.v1 (%d) + blueGreen.trafficSplit.v2 (%d) must equal 100" $v1 $v2) }}
{{- end }}
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceSplitter
metadata:
  name: backend
  namespace: {{ include "circuit-breaker.namespace" . }}
  labels:
    {{- include "circuit-breaker.labels" . | nindent 4 }}
spec:
  splits:
    - weight: {{ $v1 }}
      serviceSubset: v1
    - weight: {{ $v2 }}
      serviceSubset: v2
{{- end }}
