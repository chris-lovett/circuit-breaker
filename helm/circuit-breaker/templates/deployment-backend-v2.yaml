{{- if .Values.blueGreen.enabled }}
# ──────────────────────────────────────────────────────────────────────────────
# Backend v2 Deployment  (blue/green mode only)
#
# Registers pods under the "backend" Consul service with metadata
# version=v2 so that the ServiceResolver can expose them as the "v2" subset.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "circuit-breaker.fullname" . }}-backend-v2
  namespace: {{ include "circuit-breaker.namespace" . }}
  labels:
    {{- include "circuit-breaker.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    version: v2
spec:
  replicas: {{ .Values.blueGreen.backendVersions.v2.replicaCount }}
  selector:
    matchLabels:
      {{- include "circuit-breaker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
      version: v2
  template:
    metadata:
      labels:
        {{- include "circuit-breaker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        version: v2
      annotations:
        {{- include "circuit-breaker.consulAnnotations" . | nindent 8 }}
        # Register under the shared "backend" Consul service name so that the
        # ServiceSplitter can route traffic between subsets without any change
        # to the frontend upstream declaration.
        consul.hashicorp.com/connect-service: backend
        consul.hashicorp.com/connect-service-port: {{ .Values.backend.service.targetPort | quote }}
        # Service metadata used by the ServiceResolver to build the "v2" subset.
        consul.hashicorp.com/service-meta-version: v2
    spec:
      serviceAccountName: {{ include "circuit-breaker.serviceAccountName" . }}
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.blueGreen.backendVersions.v2.image.repository }}:{{ .Values.blueGreen.backendVersions.v2.image.tag }}"
          imagePullPolicy: {{ .Values.blueGreen.backendVersions.v2.image.pullPolicy }}
          {{- with .Values.backend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: "0.0.0.0:{{ .Values.backend.service.targetPort }}"
            - name: NAME
              value: {{ .Values.blueGreen.backendVersions.v2.name | quote }}
            - name: TIMING_50_PERCENTILE
              value: "100ms"
            - name: ERROR_RATE
              value: "0"
            - name: ERROR_TYPE
              value: "http_error"
            - name: ERROR_CODE
              value: "500"
            {{- with .Values.blueGreen.backendVersions.v2.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
