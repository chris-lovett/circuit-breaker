apiVersion: v2
name: circuit-breaker
description: >
  A Helm chart that deploys an example two-tier application onto an existing
  Consul service mesh running on Kubernetes (or OpenShift), demonstrating the
  circuit-breaker resiliency pattern and blue/green backend traffic splitting
  via Consul's L7 traffic management CRDs.
type: application
version: 0.2.0
appVersion: "1.0.0"
keywords:
  - consul
  - service-mesh
  - circuit-breaker
  - blue-green
  - traffic-splitting
  - openshift
  - resiliency
maintainers:
  - name: circuit-breaker maintainers
