{{- if .Values.consul.serviceMonitor.enabled }}
##
## ServiceMonitor: consul-services
##
## Optional – disabled by default (set consul.serviceMonitor.enabled=true).
##
## Use this when Consul (or a Consul-exporter) exposes metrics through a
## Kubernetes Service with a named port.  Common port names: "metrics",
## "http-metrics", "prometheus".
##
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "consul-observability.fullname" . }}-consul-services
  labels:
    {{- include "consul-observability.labels" . | nindent 4 }}
    {{- include "consul-observability.prometheusLabels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.consul.namespace | quote }}
  selector:
    matchLabels:
      {{- toYaml .Values.consul.serviceMonitor.selectorLabels | nindent 6 }}
  endpoints:
    - port: {{ .Values.consul.serviceMonitor.portName | default "metrics" | quote }}
      path: {{ .Values.consul.serviceMonitor.metricsPath | default "/metrics" | quote }}
      interval: {{ .Values.consul.serviceMonitor.scrapeInterval | default "30s" | quote }}
      honorLabels: true
{{- end }}
